<svg width="100%" viewBox="0 0 1080 772" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, system-ui, sans-serif" role="img">
<title>drama916 system architecture</title>
<desc>A browser client calls a Python backend on Alibaba Function Compute, which runs an agent pipeline — script, shot plan, and a director-critic loop on cheap text before spending on expensive image and video generation — calling Qwen and HappyHorse models on Alibaba Model Studio, with the code package and seed films on Alibaba OSS.</desc>
