<rect x="40" y="726" width="1000" height="30" rx="9" fill="#FBF2DE" stroke="#EBC98A"/>
<text x="540" y="746" text-anchor="middle" font-size="12" font-weight="600" fill="#9A6708">The critic converges the story on paper — ~1–2¢ of text — BEFORE any video renders, so a $3–7 film is shot once, not burned-and-reshot.</text>
